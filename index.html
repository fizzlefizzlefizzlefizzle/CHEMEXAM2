<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CHEM 305 — Exam 2 Study App</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="flashcards" onclick="showPage('flashcards')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="8" y1="4" x2="8" y2="20"/></svg>
      <span>Flashcards</span>
    </button>
    <button class="nav-btn" data-page="exam" onclick="showPage('exam')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      <span>Exam</span>
    </button>
    <button class="nav-btn" data-page="quiz" onclick="showPage('quiz')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>Quiz</span>
    </button>
  </nav>

  <!-- PAGES -->
  <main class="pages">

    <!-- FLASHCARDS PAGE -->
    <div id="page-flashcards" class="page active">
      <div class="page-header">
        <h1>Flashcards</h1>
        <button class="icon-btn" onclick="toggleFilterPanel()" aria-label="Filter cards">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        </button>
      </div>

      <!-- Filter panel -->
      <div id="filter-panel" class="filter-panel hidden">
        <div class="filter-header">
          <span>Filter by topic</span>
          <button class="text-btn" onclick="selectAllCats()">All</button>
          <button class="text-btn" onclick="selectNoCats()">None</button>
        </div>
        <div class="filter-chips" id="filter-chips"></div>
        <div class="filter-footer">
          <span id="filter-count"></span>
          <button class="pill-btn" onclick="applyFilter()">Apply</button>
        </div>
      </div>

      <!-- Stats row -->
      <div class="fc-stats">
        <span id="fc-counter">1 / 75</span>
        <div class="fc-stat-pills">
          <span class="stat-pill known" id="known-count">0 known</span>
          <span class="stat-pill unknown" id="unknown-count">0 to review</span>
        </div>
        <button class="icon-btn-sm" onclick="shuffleDeck()" aria-label="Shuffle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        </button>
      </div>

      <!-- HORIZONTAL CARD VIEWPORT -->
      <div class="fc-viewport" id="fc-viewport">
        <div class="fc-track" id="fc-track">
          <!-- cards injected by JS -->
        </div>
      </div>

      <!-- Swipe hint -->
      <div class="swipe-hint" id="swipe-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        swipe to navigate
      </div>

      <!-- Mark buttons -->
      <div class="fc-actions">
        <button class="mark-btn mark-unknown" onclick="markCard(false)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Review again
        </button>
        <button class="mark-btn mark-known" onclick="markCard(true)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><polyline points="20 6 9 17 4 12"/></svg>
          Got it
        </button>
      </div>

      <!-- Sort section buttons -->
      <div class="sort-section">
        <div class="sort-label">Sort into stacks</div>
        <div class="sort-stacks" id="sort-stacks"></div>
      </div>
    </div>

    <!-- EXAM PAGE -->
    <div id="page-exam" class="page">
      <div class="page-header">
        <h1>Practice Exam</h1>
        <div class="score-badges">
          <span class="score-badge" id="exam-mc-score">MC: 0/0</span>
          <span class="score-badge" id="exam-fr-score">FR: 0/0</span>
        </div>
      </div>
      <div class="exam-section-title">Part I — Multiple choice</div>
      <div id="exam-mc-container"></div>
      <div class="exam-section-title">Part II — Free response</div>
      <div id="exam-fr-container"></div>
    </div>

    <!-- QUIZ PAGE -->
    <div id="page-quiz" class="page">
      <div class="page-header">
        <h1>Practice Quiz</h1>
        <div class="score-badges">
          <span class="score-badge" id="quiz-score-badge">0 / 0</span>
        </div>
      </div>
      <div class="quiz-tabs">
        <button class="qtab active" id="qt-mc" onclick="switchQuizTab('mc')">Multiple choice</button>
        <button class="qtab" id="qt-fill" onclick="switchQuizTab('fill')">Fill in blank</button>
        <button class="icon-btn-sm" onclick="newQuizSet()" aria-label="New set" style="margin-left:auto">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
      </div>
      <div id="quiz-mc-section"></div>
      <div id="quiz-fill-section" style="display:none"></div>
    </div>

  </main>

  <script src="data-flashcards.js"></script>
  <script src="data-examMC.js"></script>
  <script src="data-examFR.js"></script>
  <script src="data-quizPool.js"></script>
  <script src="flashcards.js"></script>
  <script src="exam.js"></script>
  <script src="quiz.js"></script>
  <script src="app.js"></script>
</body>
</html>
